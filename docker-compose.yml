services:
  vectorbt_lab:
    build: ./research
    container_name: vectorbt_lab
    ports:
      - "${VBT_PORT:-8888}:8888"
    volumes:
      # explicit mounts (avoid flaky root bind)
      - ./research:/home/jovyan/repo/research
      - ./execution:/home/jovyan/repo/execution
      - ./common:/home/jovyan/repo/common:ro
      - ./configs:/home/jovyan/repo/configs
      # helpers
      - ./research/notebooks:/home/jovyan/work
      - ./execution/data:/home/jovyan/data
      - ./research/artifacts:/home/jovyan/artifacts
    environment:
      PYTHONPATH: "/home/jovyan/repo"
      JUPYTER_ENABLE_LAB: "yes"
      NB_UID: "1000"
      NB_GID: "1000"
      TZ: "Asia/Kolkata"

  backtrader_exec:
    build: ./execution
    container_name: backtrader_exec
    depends_on:
      - vectorbt_lab
    command: >
      sh -c "
        CPO_SYMBOL=${CPO_SYMBOL:-HDFCBANK.NS} python jobs/select_macd_params.py &&
        CPO_SYMBOL=${CPO_SYMBOL:-HDFCBANK.NS} python jobs/build_macd_signals.py &&
        python run_live.py &
        streamlit run monitor_app.py --server.port 8501 --server.address 0.0.0.0
      "
    env_file:
      - .env
    ports:
      - "${BT_PORT:-8501}:8501"
    volumes:
      - ./execution:/app
      - ./common:/app/common:ro
      - ./research:/app/research:ro
      - ./research/artifacts:/app/artifacts:ro
    environment:
      TZ: "Asia/Kolkata"
      PYTHONPATH: "/app:/app/research:/app/common"

  selector:
    build: ./execution
    container_name: cpo_selector
    working_dir: /app
    env_file:
      - .env
    command: python jobs/select_macd_params.py
    volumes:
      - ./execution:/app
      - ./common:/app/common:ro
      - ./research/artifacts:/app/artifacts:ro
    profiles:
      - selector
